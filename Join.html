<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Join Kuchipudi Community</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="index.css">

</head>

<body>

<header>
<h1>Join the Kuchipudi Community</h1>
<p>Become part of the classical dance journey</p>
</header>


<section class="container">

<div class="join-box">

<h2 class="text-center mb-4">Registration Form</h2>

<form onsubmit="showMessage(event)">

<div class="lable">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="lable">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="lable">
<label class="form-label">Age</label>
<input type="number" class="form-control" placeholder="Enter your age">
</div>

<div class="lable">
<label class="form-label">Dance Experience</label>
<select class="form-select">
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>
</div>

<div class="lable">
<label class="form-label">Why do you want to learn Kuchipudi?</label>
<textarea class="form-control" rows="4"></textarea>
</div>

<div class="text-center">

<button class="btn btn-danger px-4">
Join Now
</button>

</div>

</form>
<div id="successMessage" class="alert alert-success text-center mt-4" style="display:none;">
✔ Your form response has been successful.  
Happy to have you with us in the Kuchipudi community!
</div>

</div>

</section>

<script>


<footer>
<p>Kuchipudi Project | Front End Development</p>
</footer>

<script src="script.js"></script>

</body>
</html>
